<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%">
      <stop offset="0%"   stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#4da6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4da6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#4da6ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Earth landmass suggestion -->
  <ellipse cx="14" cy="16" rx="5" ry="7" fill="#2d7a40" opacity="0.7"/>
  <ellipse cx="20" cy="13" rx="3" ry="4" fill="#8a6020" opacity="0.6"/>
  <!-- Atmosphere glow -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)"/>
  <!-- Highlight -->
  <ellipse cx="11" cy="11" rx="4" ry="3" fill="white" opacity="0.08"/>
  <!-- Accent dot -->
  <circle cx="24" cy="8" r="2" fill="#4da6ff" opacity="0.9"/>
  <circle cx="24" cy="8" r="3" fill="#4da6ff" opacity="0.2"/>
</svg>
